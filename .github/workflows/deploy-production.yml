name: Deploy — Production

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "8"
  AZURE_RESOURCE_GROUP: hemosync-rg-prod
  AZURE_LOCATION: centralindia

jobs:
  validate-tag:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Get version from tag
        id: get-version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Validate semver
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version format: $VERSION"
            exit 1
          fi
          echo "Deploying version: $VERSION"

  build:
    name: Build for Production
    runs-on: ubuntu-latest
    needs: validate-tag
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all (production)
        run: pnpm turbo run build
        env:
          NODE_ENV: production
          VITE_API_BASE_URL: ${{ secrets.PROD_APIM_GATEWAY_URL }}/api

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-prod
          path: apps/web/dist
          retention-days: 7

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-dist-prod
          path: |
            api/dist
            api/host.json
            api/package.json
          retention-days: 7

  deploy-api:
    name: Deploy Azure Functions (Production)
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-dist-prod
          path: ./api-artifact

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_PROD }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: hemosync-api-prod
          package: ./api-artifact
          scm-do-build-during-deployment: false

  deploy-web:
    name: Deploy Web Dashboard (Production)
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist-prod
          path: ./web-artifact

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_PROD }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: hemosync-web-prod
          package: ./web-artifact

  deploy-teams-bot:
    name: Deploy Teams Bot (Production)
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install & Build
        run: |
          pnpm install --frozen-lockfile
          pnpm turbo run build --filter=teams-bot

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_PROD }}

      - name: Deploy Teams Bot
        uses: azure/webapps-deploy@v3
        with:
          app-name: hemosync-bot-prod
          package: apps/teams-bot/dist

  smoke-test:
    name: Production Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Health check
        run: pnpm tsx scripts/health-check.ts
        env:
          APIM_GATEWAY_URL: ${{ secrets.PROD_APIM_GATEWAY_URL }}
          APIM_SUBSCRIPTION_KEY: ${{ secrets.PROD_APIM_SUBSCRIPTION_KEY }}

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: smoke-test
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            CHANGELOG.md

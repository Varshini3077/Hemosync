name: Deploy — Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "8"
  AZURE_RESOURCE_GROUP: hemosync-rg
  AZURE_LOCATION: centralindia

jobs:
  build:
    name: Build for Staging
    runs-on: ubuntu-latest
    outputs:
      web-artifact: ${{ steps.upload-web.outputs.artifact-id }}
      api-artifact: ${{ steps.upload-api.outputs.artifact-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all
        continue-on-error: true
        run: pnpm turbo run build
        env:
          NODE_ENV: production
          VITE_API_BASE_URL: ${{ secrets.STAGING_APIM_GATEWAY_URL }}/api

      - name: Upload web artifact
        id: upload-web
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-staging
          path: apps/web/dist
          retention-days: 1

      - name: Upload API artifact
        id: upload-api
        uses: actions/upload-artifact@v4
        with:
          name: api-dist-staging
          path: |
            api/dist
            api/host.json
            api/package.json
          retention-days: 1

  deploy-api:
    name: Deploy Azure Functions (Staging)
    if: false
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-dist-staging
          path: ./api-artifact

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_STAGING }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: hemosync-api-staging
          package: ./api-artifact
          scm-do-build-during-deployment: false

  deploy-web:
    name: Deploy Web Dashboard (Staging)
    if: false
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist-staging
          path: ./web-artifact

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_STAGING }}

      - name: Deploy to Azure App Service (staging slot)
        uses: azure/webapps-deploy@v3
        with:
          app-name: hemosync-web-staging
          package: ./web-artifact

  deploy-teams-bot:
    name: Deploy Teams Bot (Staging)
    if: false
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build teams-bot
        run: pnpm turbo run build --filter=teams-bot

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_STAGING }}

      - name: Deploy Teams Bot
        uses: azure/webapps-deploy@v3
        with:
          app-name: hemosync-bot-staging
          package: apps/teams-bot/dist

  smoke-test:
    name: Smoke Test (Staging)
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Health check
        run: pnpm tsx scripts/health-check.ts
        env:
          APIM_GATEWAY_URL: ${{ secrets.STAGING_APIM_GATEWAY_URL }}
          APIM_SUBSCRIPTION_KEY: ${{ secrets.STAGING_APIM_SUBSCRIPTION_KEY }}
